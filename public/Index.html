<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>
    body {
    margin: 0;
    min-height: 100vh; /* changed from fixed height */
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    background: #0b0f14;
    color: #e5e7eb;
}

/* Dashboard layout upgrade */
.dashboard {
    width: 100%;
    max-width: 1100px; /* allow expansion */
    padding: 20px;
    display: grid;
    grid-template-columns: 1fr; /* mobile first */
    gap: 20px;
}

/* Card wrapper (NEW, keeps your style inside) */
.card {
    padding: 30px;
    border-radius: 16px;
    background: rgba(20, 25, 32, 0.8);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 0 40px rgba(0,0,0,0.6);
    text-align: center;
}

/* Keep your original styles */
h1 {
    font-size: 1rem;
    font-weight: 400;
    opacity: 0.7;
    margin-bottom: 10px;
}

.temp-main {
    font-size: 3.5rem;
    font-weight: 500;
    color: #10a37f;
}

.units {
    font-size: 0.9rem;
    opacity: 0.6;
}

.status {
    margin-top: 15px;
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 0.85rem;
    display: inline-block;
}

.safe {
    background: rgba(16,163,127,0.2);
    color: #10a37f;
}

.normal {
    background: rgba(234,179,8,0.15);
    color: #eab308;
}

.danger {
    background: rgba(239,68,68,0.15);
    color: #ef4444;
}

.bar {
    margin-top: 20px;
    height: 6px;
    width: 100%;
    border-radius: 10px;
    background: #1f2937;
    position: relative;
}

.indicator {
    position: absolute;
    top: -4px;
    width: 14px;
    height: 14px;
    background: #10a37f;
    border-radius: 50%;
    box-shadow: 0 0 10px #10a37f;
    transition: left 0.4s ease;
}

/* Chart container (NEW) */
.chart-container {
    width: 100%;
    height: 200px;
    margin-top: 15px;
}

.axis-values {
    display: flex;
    justify-content: space-around;
    margin-top: 10px;
    font-size: 0.9rem;
    opacity: 0.7;
}

.axis-values div {
    padding: 4px 8px;
}
.axis-values div {
    background: rgba(255,255,255,0.05);
    border-radius: 6px;
}

canvas {
    width: 100% !important;
    height: 100% !important;
}

/* Tablet */
@media (min-width: 768px) {
    .dashboard {
        grid-template-columns: 1fr 1fr;
    }
}

/* Desktop */
@media (min-width: 1024px) {
    .dashboard {
        grid-template-columns: repeat(3, 1fr);
    }
}
</style>
</head>

<body>
    <div class="dashboard">
    <div class="card temp-card">
        <h1>Temperature</h1>
        <div class="temp-main" id="celsius">--°C</div>
        <div class="units" id="otherUnits">-- K | -- °F</div>
        <div class="status" id="status">--</div>

        <div class="bar">
            <div class="indicator" id="indicator"></div>
        </div>
    </div>

    <div class="card motion-card">
        <h1>Vibration</h1>
            <div class="axis-values">
        <div id="xVal">X: --</div>
        <div id="yVal">Y: --</div>
        <div id="zVal">Z: --</div>
    </div>
        <div class="chart-container">
            <canvas id="motionChart"></canvas>
        </div>
    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>


// graph variables
const maxPoints = 30;

let labels = [];
let xData = [];
let yData = [];
let zData = [];

const motionChart = new Chart(document.getElementById('motionChart'), {
    type: 'line',
    data: {
        labels: labels,
        datasets: [
            { label: 'X', data: xData, borderWidth: 2 },
            { label: 'Y', data: yData, borderWidth: 2 },
            { label: 'Z', data: zData, borderWidth: 2 }
        ]
    },
    options: {
    animation: true,
    responsive: true,
    scales: {
        x: { display: false },
        y: {
            suggestedMin: -2,
            suggestedMax: 2
        }
    }
}
});

function updateMotion(x, y, z) {
    console.log(x,y,z)
    document.getElementById("xVal").innerText = "X: " + x.toFixed(2);
    document.getElementById("yVal").innerText = "Y: " + y.toFixed(2);
    document.getElementById("zVal").innerText = "Z: " + z.toFixed(2);
}

function classifyTemp(temp) {
    if (temp < 20) return "safe";
    if (temp < 40) return "normal";
    return "danger";
}

function updateUI(temp) {
    const kelvin = (temp + 273.15).toFixed(2);
    const fahrenheit = ((temp * 9/5) + 32).toFixed(2);

    document.getElementById("celsius").innerText = temp + "°C";
    document.getElementById("otherUnits").innerText = `${kelvin} K | ${fahrenheit} °F`;

    const status = classifyTemp(temp);
    const statusEl = document.getElementById("status");

    statusEl.className = "status " + status;

    if (status === "safe") statusEl.innerText = "SAFE";
    if (status === "normal") statusEl.innerText = "NORMAL";
    if (status === "danger") statusEl.innerText = "DANGER";

    const percent = Math.min(100, Math.max(0, temp * 2));
    document.getElementById("indicator").style.left = percent + "%";

    if (status === "danger") {
        document.querySelector(".temp-main").style.color = "#ef4444";
    } else if (status === "normal") {
        document.querySelector(".temp-main").style.color = "#eab308";
    } else {
        document.querySelector(".temp-main").style.color = "#10a37f";
    }
}

function updateGraphUI(data) {
    document.getElementById("xVal").innerText = `X: ${data.x.toFixed(2)}`;
    document.getElementById("yzVal").innerText = `Y: ${data.y.toFixed(2)} | Z: ${data.z.toFixed(2)}`;
}

function updateGraph(data) {
    const time = new Date().toLocaleTimeString();
    labels.push(time);
    xData.push(data.x);
    yData.push(data.y);
    zData.push(data.z);

    if (labels.length > maxPoints) {
        labels.shift();
        xData.shift();
        yData.shift();
        zData.shift();
    }

    motionChart.update();
}

let eventSource;

function connectSSE() {
    eventSource = new EventSource('https://esp32-puyl.onrender.com/api/stream');

    eventSource.onmessage = function(event) {
        const data = JSON.parse(event.data);
        updateUI(data.temperature);
        updateGraph(data.sensorData);
        updateMotion(Number(data.sensorData.x),Number(data.sensorData.y),Number(data.sensorData.z))
    };

    eventSource.onerror = function() {
        console.log("SSE disconnected. Reconnecting...");
        eventSource.close();
        setTimeout(connectSSE, 3000);
    };
}

connectSSE();
</script>

</body>
</html>
